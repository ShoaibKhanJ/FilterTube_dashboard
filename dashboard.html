<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FilterTube Dashboard</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="brand">
      Filter<span>Tube</span>
    </div>

    <nav>
      <a class="active">Dashboard</a>
      <a>Analytics</a>
      <a>Filters</a>
      <a>Profile</a>
      <a>Upgrade</a>
      <a>Settings</a>
    </nav>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOP BAR -->
    <div class="topbar">

      <div>
        <h2>Dashboard</h2>
        <p class="muted">Overview of your activity</p>
      </div>

      <div class="profile">
        <img src="https://via.placeholder.com/40" class="avatar"/>
      </div>

    </div>

    <!-- STATS -->
    <div class="grid">

      <div class="card stat">
        <h3>2h 45m</h3>
        <p>Watch Time Today</p>
      </div>

      <div class="card stat">
        <h3>128</h3>
        <p>Videos Filtered</p>
      </div>

      <div class="card stat">
        <h3>34</h3>
        <p>Shorts Blocked</p>
      </div>

    </div>

    <!-- ANALYTICS SECTION -->
    <div class="card large">

      <h3>Analytics</h3>
      <p class="muted">Your productivity trend</p>

      <div class="chart-placeholder">
        Chart will go here
      </div>

    </div>

  </main>

</div>

</body>
</html>
